version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fleet_db
    environment:
      POSTGRES_DB: fleet_bot
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: fleet_redis
    restart: always

  web:
    build: .
    container_name: fleet_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    ports:
      - "8000:8000"
    env_file:
       - .env
    volumes:
      - media_data:/app/media
    depends_on:
      - db
      - redis
    restart: always

  bot:
    build: .
    container_name: fleet_bot
    command: python manage.py runbot
    env_file:
       - .env
    volumes:
      - media_data:/app/media
    depends_on:
      - db
      - redis
    restart: always

  worker:
    build: .
    container_name: fleet_worker
    command: celery -A config worker -l info
    env_file:
       - .env
    volumes:
      - media_data:/app/media
    depends_on:
      - db
      - redis
    restart: always

  beat:
    build: .
    container_name: fleet_beat
    command: celery -A config beat -l info
    env_file:
       - .env
    depends_on:
      - db
      - redis
    restart: always

volumes:
  postgres_data:
  media_data: